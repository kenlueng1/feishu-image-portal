<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞书图片资源中心</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#4F46E5;--primary-dark:#3730A3;--success:#10B981;--danger:#EF4444;--surface:#fff;--surface-elevated:#FAFAFA;--background:#F3F4F6;--text-primary:#111827;--text-secondary:#6B7280;--border:#E5E7EB;--shadow-md:0 4px 6px -1px rgba(0,0,0,.1);--shadow-lg:0 10px 15px -3px rgba(0,0,0,.1);--radius:12px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--background);color:var(--text-primary);min-height:100vh}
        .container{max-width:1400px;margin:0 auto;padding:24px}
        .header{background:var(--surface);border-radius:var(--radius);padding:20px 32px;box-shadow:var(--shadow-md);margin-bottom:32px;display:flex;justify-content:space-between;align-items:center}
        .logo{display:flex;align-items:center;gap:12px;font-size:22px;font-weight:700}
        .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--primary),#818CF8);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px}
        .admin-btn{padding:8px 18px;background:var(--surface-elevated);border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
        .admin-btn:hover{border-color:var(--primary);color:var(--primary)}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
        .stat-card{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-md)}
        .stat-icon{font-size:28px;margin-bottom:10px}
        .stat-value{font-size:28px;font-weight:700}
        .stat-label{font-size:13px;color:var(--text-secondary);margin-top:4px}
        .toolbar{background:var(--surface);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow-md);margin-bottom:24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
        .search-box{flex:1;min-width:220px;position:relative}
        .search-box input{width:100%;padding:10px 14px 10px 38px;border:2px solid var(--border);border-radius:8px;font-size:14px;transition:all .2s}
        .search-box input:focus{outline:none;border-color:var(--primary)}
        .search-box::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%)}
        .filter-select{padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface-elevated);cursor:pointer}
        .filter-select:focus{outline:none;border-color:var(--primary)}
        .images-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
        .image-card{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-md);transition:all .3s}
        .image-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
        .image-preview{position:relative;aspect-ratio:1;overflow:hidden;background:var(--surface-elevated)}
        .image-preview img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
        .image-card:hover .image-preview img{transform:scale(1.05)}
        .image-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6),transparent);opacity:0;transition:opacity .3s;display:flex;align-items:flex-end;justify-content:center;padding:16px}
        .image-card:hover .image-overlay{opacity:1}
        .dl-btn{background:#fff;color:var(--primary);border:none;padding:10px 20px;border-radius:6px;font-weight:600;cursor:pointer;transition:all .2s;font-size:13px}
        .dl-btn:hover{background:var(--primary);color:#fff}
        .image-info{padding:14px}
        .image-title{font-size:14px;font-weight:600;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .image-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
        .tag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
        .tag.color{background:rgba(239,68,68,.1);color:#DC2626}
        .tag.theme{background:rgba(79,70,229,.1);color:var(--primary)}
        .image-stats{font-size:12px;color:var(--text-secondary)}
        .admin-tabs{display:flex;gap:8px;margin-bottom:24px;background:var(--surface);padding:8px;border-radius:var(--radius);box-shadow:var(--shadow-md)}
        .admin-tab{flex:1;padding:12px;border:none;background:0 0;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text-secondary);transition:all .2s}
        .admin-tab.active{background:var(--primary);color:#fff}
        .admin-panel{display:none}
        .admin-panel.active{display:block}
        .upload-form{background:var(--surface);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow-md);max-width:700px}
        .upload-form h3{font-size:18px;font-weight:700;margin-bottom:20px}
        .upload-section{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
        .upload-box{background:var(--surface-elevated);border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
        .upload-box:hover{border-color:var(--primary)}
        .upload-box.has-preview{border-color:var(--success);background:rgba(16,185,129,.05)}
        .upload-box input{display:none}
        .upload-box-icon{font-size:36px;margin-bottom:8px}
        .upload-box-title{font-size:14px;font-weight:600;margin-bottom:4px}
        .upload-box-sub{font-size:12px;color:var(--text-secondary)}
        .upload-box-preview{width:100%;aspect-ratio:1;object-fit:contain;border-radius:4px;margin-bottom:8px}
        .upload-box-name{font-size:11px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:4px}
        .upload-box-remove{position:absolute;top:6px;right:6px;width:22px;height:22px;background:var(--danger);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:12px;line-height:22px}
        .form-group{margin-bottom:14px}
        .form-label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
        .form-input{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:6px;font-size:14px;transition:all .2s}
        .form-input:focus{outline:none;border-color:var(--primary)}
        .table-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-md);overflow:hidden}
        .data-table{width:100%;border-collapse:collapse}
        .data-table th{background:var(--surface-elevated);padding:12px 16px;text-align:left;font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;border-bottom:1px solid var(--border)}
        .data-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
        .modal-overlay.active{display:flex}
        .modal{background:var(--surface);border-radius:var(--radius);max-width:440px;width:100%;box-shadow:var(--shadow-lg);animation:slideIn .25s ease}
        @keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .modal-header{padding:20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
        .modal-title{font-size:17px;font-weight:700}
        .modal-close{width:30px;height:30px;border:none;background:var(--surface-elevated);border-radius:50%;cursor:pointer;font-size:18px}
        .modal-close:hover{background:var(--danger);color:#fff}
        .modal-body{padding:20px}
        .modal-footer{padding:16px 20px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border)}
        .btn{padding:10px 20px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:hover{background:var(--primary-dark)}
        .btn-secondary{background:var(--surface-elevated)}
        .btn-secondary:hover{background:var(--border)}
        .toast{position:fixed;bottom:20px;right:20px;background:var(--surface);padding:14px 20px;border-radius:8px;box-shadow:var(--shadow-lg);display:none;align-items:center;gap:10px;z-index:2000;min-width:200px}
        .toast.show{display:flex}
        .toast.success{border-left:4px solid var(--success)}
        .toast.error{border-left:4px solid var(--danger)}
        .empty-state{text-align:center;padding:48px;color:var(--text-secondary)}
        .edit-btn{background:var(--surface-elevated);border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px}
        .edit-btn:hover{background:var(--primary);color:#fff}
        .login-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:2000}
        .login-modal.active{display:flex}
        .login-box{background:var(--surface);border-radius:var(--radius);padding:36px;max-width:360px;width:100%;box-shadow:var(--shadow-lg);text-align:center}
        .login-box h3{font-size:20px;font-weight:700;margin-bottom:20px}
        @media(max-width:768px){.container{padding:12px}.header{flex-direction:column;gap:12px}.images-grid{grid-template-columns:repeat(2,1fr)}.upload-section{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="container" id="app">
    <header class="header">
        <div class="logo"><div class="logo-icon">F</div><span>飞书图片资源中心</span></div>
        <button class="admin-btn" id="adminToggleBtn" onclick="toggleAdmin()">⚙️ 管理员入口</button>
    </header>

    <!-- 客户视图 -->
    <div id="clientView">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon">📁</div><div class="stat-value" id="totalImages">0</div><div class="stat-label">图片总数</div></div>
            <div class="stat-card"><div class="stat-icon">📥</div><div class="stat-value" id="totalDownloads">0</div><div class="stat-label">总下载量</div></div>
            <div class="stat-card"><div class="stat-icon">🌍</div><div class="stat-value" id="totalCountries">0</div><div class="stat-label">下载国家数</div></div>
            <div class="stat-card"><div class="stat-icon">🎨</div><div class="stat-value" id="totalColors">0</div><div class="stat-label">颜色分类</div></div>
        </div>
        <div class="toolbar">
            <div class="search-box"><input type="text" placeholder="搜索图片名称..." id="searchInput"></div>
            <select class="filter-select" id="colorFilter"><option value="">全部颜色</option></select>
            <select class="filter-select" id="themeFilter"><option value="">全部主题</option></select>
        </div>
        <div class="images-grid" id="imagesGrid"><div class="empty-state">⏳ 正在加载...</div></div>
    </div>

    <!-- 管理员视图 -->
    <div id="adminView" style="display:none">
        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="upload">📤 添加图片</button>
            <button class="admin-tab" data-tab="records">📋 下载记录</button>
            <button class="admin-tab" data-tab="manage">🖼️ 图片管理</button>
        </div>
        <div class="admin-panel active" id="uploadPanel">
            <div class="upload-form">
                <h3>📤 添加图片</h3>
                <div class="upload-section">
                    <!-- 预览图 -->
                    <div class="upload-box" id="previewBox" onclick="document.getElementById('previewInput').click()">
                        <input type="file" id="previewInput" accept="image/*" onchange="handlePreviewSelect(this.files[0])">
                        <div id="previewContent">
                            <div class="upload-box-icon">🖼️</div>
                            <div class="upload-box-title">预览图</div>
                            <div class="upload-box-sub">PNG/JPG · 250×250</div>
                        </div>
                    </div>
                    <!-- 设计图 -->
                    <div class="upload-box" id="designBox" onclick="document.getElementById('designInput').click()">
                        <input type="file" id="designInput" accept="image/*" onchange="handleDesignSelect(this.files[0])">
                        <div id="designContent">
                            <div class="upload-box-icon">🎨</div>
                            <div class="upload-box-title">设计图</div>
                            <div class="upload-box-sub">PNG/JPG · 750×700</div>
                        </div>
                    </div>
                </div>
                <div class="form-group"><label class="form-label">图片名称 *</label>
                    <input type="text" class="form-input" id="uploadName" placeholder="请输入图片名称" oninput="updateUploadBtn()">
                </div>
                <div class="form-group"><label class="form-label">颜色分类</label>
                    <select class="form-input" id="uploadColor">
                        <option value="">不设置</option>
                        <option value="红色">红色</option><option value="蓝色">蓝色</option><option value="绿色">绿色</option>
                        <option value="黄色">黄色</option><option value="紫色">紫色</option><option value="橙色">橙色</option>
                        <option value="黑色">黑色</option><option value="白色">白色</option>
                    </select>
                </div>
                <div class="form-group"><label class="form-label">主题分类</label>
                    <select class="form-input" id="uploadTheme">
                        <option value="">不设置</option>
                        <option value="促销">促销</option><option value="节日">节日</option><option value="产品">产品</option>
                        <option value="品牌">品牌</option><option value="活动">活动</option>
                    </select>
                </div>
                <button class="btn btn-primary" id="uploadBtn" onclick="submitUpload()" style="width:100%;padding:14px" disabled>✅ 添加图片</button>
            </div>
        </div>
        <div class="admin-panel" id="recordsPanel">
            <div class="table-wrap">
                <table class="data-table">
                    <thead><tr><th>图片名称</th><th>下载人</th><th>上线时间</th><th>国家</th><th>下载时间</th></tr></thead>
                    <tbody id="recordsTable"><tr><td colspan="5" class="empty-state">加载中...</td></tr></tbody>
                </table>
            </div>
        </div>
        <div class="admin-panel" id="managePanel">
            <div class="images-grid" id="adminImagesGrid"></div>
        </div>
    </div>
</div>

<!-- 登录弹窗 -->
<div class="login-modal" id="loginModal">
    <div class="login-box">
        <div class="logo-icon" style="margin:0 auto 16px">F</div>
        <h3>管理员登录</h3>
        <div class="form-group"><input type="password" class="form-input" id="adminPassword" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter')adminLogin()"></div>
        <div style="display:flex;gap:10px;margin-top:8px">
            <button class="btn btn-secondary" style="flex:1" onclick="closeLoginModal()">取消</button>
            <button class="btn btn-primary" style="flex:1" onclick="adminLogin()">登录</button>
        </div>
    </div>
</div>

<!-- 下载弹窗 -->
<div class="modal-overlay" id="downloadModal">
    <div class="modal">
        <div class="modal-header"><div class="modal-title">填写下载信息</div><button class="modal-close" onclick="closeModal('downloadModal')">×</button></div>
        <div class="modal-body">
            <div class="form-group"><label class="form-label">下载人名称 *</label><input type="text" class="form-input" id="downloadName" placeholder="请输入您的姓名"></div>
            <div class="form-group"><label class="form-label">活动上线时间 *</label><input type="date" class="form-input" id="downloadDate"></div>
            <div class="form-group"><label class="form-label">所属国家 *</label>
                <select class="form-input" id="downloadCountry">
                    <option value="">请选择国家</option>
                    <option value="中国">中国</option><option value="美国">美国</option><option value="英国">英国</option>
                    <option value="法国">法国</option><option value="德国">德国</option><option value="日本">日本</option>
                    <option value="韩国">韩国</option><option value="澳大利亚">澳大利亚</option><option value="加拿大">加拿大</option>
                    <option value="巴西">巴西</option><option value="印度">印度</option><option value="新加坡">新加坡</option>
                </select>
            </div>
            <input type="hidden" id="currentImageId"><input type="hidden" id="currentImageName">
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('downloadModal')">取消</button>
            <button class="btn btn-primary" onclick="submitDownload()">确认下载设计图</button>
        </div>
    </div>
</div>

<!-- 编辑弹窗 -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-header"><div class="modal-title">编辑图片信息</div><button class="modal-close" onclick="closeModal('editModal')">×</button></div>
        <div class="modal-body">
            <div class="form-group"><label class="form-label">图片名称</label><input type="text" class="form-input" id="editName"></div>
            <div class="form-group"><label class="form-label">颜色分类</label>
                <select class="form-input" id="editColor"><option value="">不设置</option><option value="红色">红色</option><option value="蓝色">蓝色</option><option value="绿色">绿色</option><option value="黄色">黄色</option><option value="紫色">紫色</option></select>
            </div>
            <div class="form-group"><label class="form-label">主题分类</label>
                <select class="form-input" id="editTheme"><option value="">不设置</option><option value="促销">促销</option><option value="节日">节日</option><option value="产品">产品</option><option value="品牌">品牌</option><option value="活动">活动</option></select>
            </div>
            <input type="hidden" id="editRecordId">
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('editModal')">取消</button>
            <button class="btn btn-primary" onclick="saveEdit()">保存</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"><span id="toastIcon"></span><span id="toastMessage"></span></div>

<script>
const API = '';
let allImages=[], allRecords=[], isAdmin=false;
let previewFile=null, designFile=null;

// ── 管理员 ──
function toggleAdmin() {
    if(isAdmin){isAdmin=false;document.getElementById('adminView').style.display='none';document.getElementById('clientView').style.display='block';document.getElementById('adminToggleBtn').textContent='⚙️ 管理员入口';}
    else{document.getElementById('loginModal').classList.add('active');setTimeout(()=>document.getElementById('adminPassword').focus(),100);}
}
function closeLoginModal(){document.getElementById('loginModal').classList.remove('active');document.getElementById('adminPassword').value='';}
async function adminLogin(){
    const pwd=document.getElementById('adminPassword').value;
    const res=await fetch(API+'/api/admin-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})});
    const data=await res.json();
    if(data.success){isAdmin=true;closeLoginModal();document.getElementById('clientView').style.display='none';document.getElementById('adminView').style.display='block';document.getElementById('adminToggleBtn').textContent='👤 退出管理';loadRecords();}
    else{showToast('密码错误','error');}
}

// ── 数据（带自动重试）──
async function loadData(retry=0){
    try{
        const res=await fetch(API+'/api/images');
        if(!res.ok) throw new Error('HTTP '+res.status);
        const data=await res.json();
        allImages=data.success?data.data:[];
        renderStats();renderImages(allImages);updateFilters();
        if(isAdmin)renderAdminImages();
    }catch(e){
        console.warn('加载失败:', e.message, '重试:', retry);
        if(retry<3){
            await new Promise(r=>setTimeout(r,2000));
            await loadData(retry+1);
        }else{
            // 显示后备图
            renderStats();renderImages(allImages);updateFilters();
        }
    }
}
async function loadRecords(){
    try{
        const res=await fetch(API+'/api/records');
        const data=await res.json();
        allRecords=data.success?data.data:[];
        renderRecords();
    }catch(e){}
}
function renderStats(){
    document.getElementById('totalImages').textContent=allImages.length;
    document.getElementById('totalDownloads').textContent=allImages.reduce((s,i)=>s+i.downloads,0);
    const cs=new Set();allImages.forEach(i=>i.countries.forEach(c=>cs.add(c)));
    document.getElementById('totalCountries').textContent=cs.size;
    document.getElementById('totalColors').textContent=new Set(allImages.map(i=>i.color).filter(Boolean)).size;
}
function updateFilters(){
    const colors=[...new Set(allImages.map(i=>i.color).filter(Boolean))];
    const themes=[...new Set(allImages.map(i=>i.theme).filter(Boolean))];
    document.getElementById('colorFilter').innerHTML='<option value="">全部颜色</option>'+colors.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
    document.getElementById('themeFilter').innerHTML='<option value="">全部主题</option>'+themes.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join('');
}
function filterImages(){
    const s=document.getElementById('searchInput').value.toLowerCase();
    const c=document.getElementById('colorFilter').value;
    const t=document.getElementById('themeFilter').value;
    renderImages(allImages.filter(i=>i.name.toLowerCase().includes(s)&&(!c||i.color===c)&&(!t||i.theme===t)));
}
function renderImages(imgs){
    const g=document.getElementById('imagesGrid');
    if(!imgs||!imgs.length){g.innerHTML='<div class="empty-state">暂无图片</div>';return;}
    g.innerHTML=imgs.map(i=>`<div class="image-card"><div class="image-preview"><img src="${esc(i.previewUrl||i.url)}" alt="${esc(i.name)}" onerror="this.src='https://picsum.photos/seed/${esc(i.id)}/250/250'"><div class="image-overlay"><button class="dl-btn" onclick="openDownloadModal('${esc(i.id)}','${esc(i.name)}')">⬇️ 下载设计图</button></div></div><div class="image-info"><div class="image-title">${esc(i.name)}</div><div class="image-tags">${i.color?`<span class="tag color">${esc(i.color)}</span>`:''}${i.theme?`<span class="tag theme">${esc(i.theme)}</span>`:''}</div><div class="image-stats">📥 ${i.downloads} · ${i.countries.length}个国家</div></div></div>`).join('');
}
function renderAdminImages(){
    const g=document.getElementById('adminImagesGrid');
    g.innerHTML=allImages.map(i=>`<div class="image-card"><div class="image-preview"><img src="${esc(i.previewUrl||i.url)}" alt="${esc(i.name)}" onerror="this.src='https://picsum.photos/seed/${esc(i.id)}/250/250'"></div><div class="image-info"><div class="image-title">${esc(i.name)}</div><div class="image-tags">${i.color?`<span class="tag color">${esc(i.color)}</span>`:''}${i.theme?`<span class="tag theme">${esc(i.theme)}</span>`:''}</div><button class="edit-btn" onclick="openEditModal('${esc(i.id)}')">✏️ 编辑</button></div></div>`).join('');
}
function renderRecords(){
    const t=document.getElementById('recordsTable');
    if(!allRecords.length){t.innerHTML='<tr><td colspan="5" class="empty-state">暂无记录</td></tr>';return;}
    t.innerHTML=allRecords.map(r=>`<tr><td>${esc(r.imageName)}</td><td>${esc(r.name)}</td><td>${esc(r.date)}</td><td>${esc(r.country)}</td><td>${esc(r.downloadTime)}</td></tr>`).join('');
}

// ── 上传 ──
function handlePreviewSelect(file){
    previewFile=file;
    const box=document.getElementById('previewBox');
    const c=document.getElementById('previewContent');
    if(!file){c.innerHTML='<div class="upload-box-icon">🖼️</div><div class="upload-box-title">预览图</div><div class="upload-box-sub">PNG/JPG · 250×250</div>';box.classList.remove('has-preview');updateUploadBtn();return;}
    const reader=new FileReader();
    reader.onload=e=>{c.innerHTML=`<img class="upload-box-preview" src="${e.target.result}"><div class="upload-box-name">${esc(file.name)}</div>`;box.classList.add('has-preview');updateUploadBtn();};
    reader.readAsDataURL(file);
}
function handleDesignSelect(file){
    designFile=file;
    const box=document.getElementById('designBox');
    const c=document.getElementById('designContent');
    if(!file){c.innerHTML='<div class="upload-box-icon">🎨</div><div class="upload-box-title">设计图</div><div class="upload-box-sub">PNG/JPG · 750×700</div>';box.classList.remove('has-preview');updateUploadBtn();return;}
    const reader=new FileReader();
    reader.onload=e=>{c.innerHTML=`<img class="upload-box-preview" src="${e.target.result}"><div class="upload-box-name">${esc(file.name)}</div>`;box.classList.add('has-preview');updateUploadBtn();};
    reader.readAsDataURL(file);
}
function updateUploadBtn(){
    const btn=document.getElementById('uploadBtn');
    const name=document.getElementById('uploadName').value.trim();
    btn.disabled=!(previewFile||designFile)||!name;
}
async function submitUpload(){
    const name=document.getElementById('uploadName').value.trim();
    const color=document.getElementById('uploadColor').value;
    const theme=document.getElementById('uploadTheme').value;
    const btn=document.getElementById('uploadBtn');
    if(!name){showToast('请填写图片名称','error');return;}
    btn.disabled=true;btn.textContent='⏳ 上传中...';
    const formData=new FormData();
    formData.append('name',name);
    if(color)formData.append('color',color);
    if(theme)formData.append('theme',theme);
    if(previewFile)formData.append('previewFile',previewFile);
    if(designFile)formData.append('designFile',designFile);
    try{
        const res=await fetch(API+'/api/upload',{method:'POST',body:formData});
        const data=await res.json();
        if(data.success){
            showToast('添加成功！','success');
            previewFile=null;designFile=null;
            document.getElementById('uploadName').value='';
            document.getElementById('uploadColor').value='';
            document.getElementById('uploadTheme').value='';
            document.getElementById('previewContent').innerHTML='<div class="upload-box-icon">🖼️</div><div class="upload-box-title">预览图</div><div class="upload-box-sub">PNG/JPG · 250×250</div>';
            document.getElementById('designContent').innerHTML='<div class="upload-box-icon">🎨</div><div class="upload-box-title">设计图</div><div class="upload-box-sub">PNG/JPG · 750×700</div>';
            document.getElementById('previewBox').classList.remove('has-preview');
            document.getElementById('designBox').classList.remove('has-preview');
            loadData();
        }else{showToast('添加失败: '+data.error,'error');}
    }catch(e){showToast('网络错误','error');}
    btn.disabled=false;btn.textContent='✅ 添加图片';
}

// ── 下载 ──
function openDownloadModal(id,name){
    document.getElementById('currentImageId').value=id;
    document.getElementById('currentImageName').value=name;
    document.getElementById('downloadName').value='';
    document.getElementById('downloadDate').value='';
    document.getElementById('downloadCountry').value='';
    document.getElementById('downloadModal').classList.add('active');
}
async function submitDownload(){
    const name=document.getElementById('downloadName').value.trim();
    const date=document.getElementById('downloadDate').value;
    const country=document.getElementById('downloadCountry').value;
    const id=document.getElementById('currentImageId').value;
    const imgName=document.getElementById('currentImageName').value;
    if(!name||!date||!country){showToast('请填写完整信息','error');return;}
    try{
        await fetch(API+'/api/download',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageId:id,imageName:imgName,name,date,country})});
        window.location.href=API+'/api/download-design/'+id;
        closeModal('downloadModal');
        showToast('下载成功！','success');
        loadData();
    }catch(e){showToast('提交失败','error');}
}

// ── 编辑 ──
function openEditModal(id){
    const img=allImages.find(i=>i.id===id);if(!img)return;
    document.getElementById('editRecordId').value=id;
    document.getElementById('editName').value=img.name;
    document.getElementById('editColor').value=img.color;
    document.getElementById('editTheme').value=img.theme;
    document.getElementById('editModal').classList.add('active');
}
async function saveEdit(){
    const id=document.getElementById('editRecordId').value;
    const name=document.getElementById('editName').value;
    const color=document.getElementById('editColor').value;
    const theme=document.getElementById('editTheme').value;
    try{
        await fetch(API+'/api/images/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,color,theme})});
        closeModal('editModal');showToast('保存成功','success');loadData();
    }catch(e){showToast('保存失败','error');}
}

// ── 工具 ──
function closeModal(id){document.getElementById(id).classList.remove('active');}
function showToast(msg,type){
    const t=document.getElementById('toast');
    document.getElementById('toastIcon').textContent=type==='success'?'✅':'❌';
    document.getElementById('toastMessage').textContent=msg;
    t.className='toast show '+type;
    setTimeout(()=>t.classList.remove('show'),3000);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── 事件 ──
document.querySelectorAll('.admin-tab').forEach(tab=>tab.onclick=()=>{
    document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.admin-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab+'Panel').classList.add('active');
    if(tab.dataset.tab==='records')loadRecords();
    if(tab.dataset.tab==='manage')renderAdminImages();
});
document.getElementById('searchInput').oninput=filterImages;
document.getElementById('colorFilter').onchange=filterImagesdocument.getElementById('themeFilter').onchange=filterImages;
document.getElementById('uploadBtn').onclick=submitUpload;
loadData();
</script>
</body>
</html>
